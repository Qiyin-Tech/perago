version: 2

# Version activation for tags/branches is managed in the Read the Docs
# dashboard Automation Rules, not in this file. Keep GitHub integration enabled
# so `main` builds `latest`, and semver tags (for example `v0.1.0`) can be
# activated as release docs versions.
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .
